<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IF-THEN – Gregorian / GPC Timeline with Day Dots</title>
  <style>
    /* same styles as before – only the relevant JS changed */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0c0e14;
      color: #eaeef2;
      padding: 20px;
      max-width: 500px;
      margin: 0 auto;
    }
    h1 { font-size: 1.5rem; margin-bottom: 4px; }
    .sub { color: #7a8499; font-size: .85rem; margin-bottom: 20px; }
    .card {
      background: #161a22;
      border: 1px solid #2c3548;
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 12px;
    }
    .rule-row {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 8px 0;
      border-bottom: 1px solid #1e2532;
    }
    .rule-row:last-child { border-bottom: none; }
    .rule-main { flex: 1; min-width: 0; }
    .rule-label { font-size: .9rem; }
    .rule-action { font-size: .8rem; color: #a78bfa; }
    .rule-meta { display: flex; gap: 6px; align-items: center; margin-top: 2px; }
    .rule-meta span { font-size: .7rem; color: #7a8499; }
    .stop-badge {
      display: inline-block;
      font-size: .65rem;
      background: rgba(248,113,113,.15);
      color: #f87171;
      padding: 1px 6px;
      border-radius: 8px;
    }
    .rule-actions {
      display: flex;
      gap: 4px;
      flex-shrink: 0;
      align-items: flex-start;
    }
    .rule-actions button {
      background: #1e2532;
      border: 1px solid #2c3548;
      color: #eaeef2;
      padding: 4px 8px;
      border-radius: 6px;
      cursor: pointer;
      font-size: .7rem;
      line-height: 1;
    }
    .rule-actions .delete-btn { color: #f87171; }
    .rule-actions .move-btn { color: #7a8499; }
    .rule-actions .move-btn:disabled { opacity: .3; cursor: default; }

    .toggle {
      width: 36px; height: 20px;
      background: #283040;
      border-radius: 10px;
      position: relative;
      cursor: pointer;
      flex-shrink: 0;
      border: 1px solid #2c3548;
      transition: background .2s;
    }
    .toggle.on { background: #4ade80; border-color: #4ade80; }
    .toggle .knob {
      width: 14px; height: 14px;
      background: white;
      border-radius: 50%;
      position: absolute;
      top: 2px; left: 2px;
      transition: transform .2s;
    }
    .toggle.on .knob { transform: translateX(16px); }

    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,.6);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 100;
    }
    .modal-overlay.show { display: flex; }
    .modal {
      background: #161a22;
      border: 1px solid #2c3548;
      border-radius: 14px;
      padding: 20px;
      width: 90%;
      max-width: 420px;
    }
    .modal h3 { margin-bottom: 12px; }
    .modal input {
      width: 100%;
      padding: 10px 12px;
      background: #1e2532;
      border: 1px solid #2c3548;
      border-radius: 8px;
      color: #eaeef2;
      font-size: .9rem;
      margin-bottom: 8px;
      outline: none;
    }
    .modal input:focus { border-color: #6c8cff; }
    .modal .row {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 8px;
    }
    .modal .row label { font-size: .85rem; white-space: nowrap; }
    .modal .row input[type="date"] { flex: 1; }
    .modal .row input[type="checkbox"] { width: auto; }
    .modal .btn-row {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }
    .modal .btn-row button {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      font-size: .9rem;
      border: none;
      cursor: pointer;
    }
    .modal .btn-save { background: #6c8cff; color: white; }
    .modal .btn-cancel { background: #1e2532; color: #eaeef2; border: 1px solid #2c3548; }

    .btn-run {
      background: #6c8cff;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      flex: 1;
    }
    .btn-run:hover { background: #4f6fdb; }
    .btn-clear {
      background: #1e2532;
      color: #eaeef2;
      border: 1px solid #2c3548;
      padding: 12px 16px;
      border-radius: 10px;
      cursor: pointer;
      font-size: .9rem;
      flex: 0 0 auto;
    }
    .fab-bar {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }
    .timeline-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      gap: 4px;
      flex-wrap: wrap;
    }
    .timeline-header .sort-btn,
    .timeline-header .gpc-btn {
      background: #1e2532;
      border: 1px solid #2c3548;
      color: #7a8499;
      padding: 4px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: .75rem;
    }
    .timeline-header .sort-btn.active,
    .timeline-header .gpc-btn.active { color: #6c8cff; border-color: #6c8cff; }
    .timeline {
      max-height: 240px;
      overflow-y: auto;
    }
    .timeline-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 6px 0;
      border-bottom: 1px solid #1e2532;
      font-size: .85rem;
    }
    .timeline-item .dot {
      font-size: 1rem;   /* larger emoji dot */
      flex-shrink: 0;
      margin-top: 2px;
      line-height: 1;
    }
    .timeline-item .msg { flex: 1; }
    .timeline-item .date { color: #a78bfa; font-size: .75rem; }
    .add-btn {
      background: #1e2532;
      border: 1px solid #2c3548;
      color: #6c8cff;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: .85rem;
      margin-bottom: 8px;
    }
    .header-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>

  <h1>⚡ IF → THEN</h1>
  <div class="sub">Toggle ON. Stop works by list order. Timeline with day dots in GPC.</div>

  <div class="card">
    <div class="header-bar">
      <span style="font-weight: 600; font-size: .9rem;">Rules</span>
      <button class="add-btn" id="addRuleBtn">+ Add rule</button>
    </div>
    <div id="rulesContainer"></div>
  </div>

  <div class="card">
    <div class="timeline-header">
      <span style="font-weight: 600; font-size: .9rem;">📜 Timeline</span>
      <div style="display:flex; gap:4px;">
        <button class="sort-btn" id="sortAscBtn" data-dir="asc">Oldest</button>
        <button class="sort-btn" id="sortDescBtn" data-dir="desc">Newest</button>
        <button class="gpc-btn" id="gpcBtn">GPC</button>
      </div>
    </div>
    <div id="timelineContainer" class="timeline">
      <div style="color: #7a8499; text-align: center; padding: 20px 0;">No events yet</div>
    </div>
  </div>

  <div class="fab-bar">
    <button class="btn-run" id="runBtn">▶ Run</button>
    <button class="btn-clear" id="clearBtn">Clear</button>
  </div>

  <!-- Edit Modal -->
  <div class="modal-overlay" id="editModal">
    <div class="modal">
      <h3>Edit Rule</h3>
      <input id="editLabel" placeholder="IF condition (e.g. Job Monday)" />
      <input id="editAction" placeholder="THEN action (e.g. Buy EUC 🛴)" />
      <div class="row">
        <label for="editDate" style="flex-shrink:0;">Date</label>
        <input type="date" id="editDate" />
      </div>
      <div class="row">
        <input type="checkbox" id="editStop" style="width:auto;" />
        <label for="editStop">Stop further rules if this fires</label>
      </div>
      <div class="btn-row">
        <button class="btn-save" id="saveEditBtn">Save</button>
        <button class="btn-cancel" id="cancelEditBtn">Cancel</button>
      </div>
    </div>
  </div>

  <script>
    // ─── GPC CALENDAR ────────────────────────────────────────────────────────
    const GPC = {
      epochUTC: Date.UTC(1982,2,24),
      epochYear: 5979,
      weekEmojis: ['🟠','🟤','🌺','🌏','🟢','🔵','🟣'],
      suitCodes: [0x2663, 0x2666, 0x2665, 0x2660],
      heptads: Object.create(null),

      initHeptads() {
        const starts = [
          1,8,15,22,31,38,45,52,61,68,75,82,89,
          92,99,106,113,122,129,136,143,152,159,166,173,180,
          183,190,197,204,213,220,227,234,243,250,257,264,271,
          274,281,288,295,304,311,318,325,334,341,348,355,362
        ];
        let i = 0;
        for (let s=0; s<4; s++) {
          for (let w=1; w<=13; w++) {
            const long = (w<=4 || w===8 || w===12);
            const len = long ? 9 : 7;
            for (let d=0; d<len; d++) {
              const doy = starts[i] + d;
              if (doy<=364) {
                this.heptads[doy] = { suit: this.suitCodes[s], week: w };
              }
            }
            i++;
          }
        }
      },

      daysFromGregorian(d) { return Math.floor((d.getTime() - this.epochUTC)/86400000); },
      gregorianFromDays(days) { return new Date(this.epochUTC + days*86400000); },

      gpcFromDays(days) {
        const mod = (a,b)=>((a%b)+b)%b;
        const leapWeeks = (r)=>{
          let l=0;
          if(mod(r,7)>=6) l+=7;
          if(mod(r,49)>=48) l+=7;
          if(mod(r+29,70)===0) l+=7;
          return l;
        };
        const cycleYears = 490;
        const cycleDays = 178969;
        let y = this.epochYear;
        if(days >= cycleDays || days <= -cycleDays){
          const cycles = Math.trunc(days / cycleDays);
          y += cycles * cycleYears;
          days -= cycles * cycleDays;
        }
        if(days >= 0){
          while(true){
            const r = y - this.epochYear;
            const yearLen = 364 + leapWeeks(r);
            if(days < yearLen) break;
            days -= yearLen;
            y++;
          }
        } else {
          while(days < 0){
            y--;
            const r = y - this.epochYear;
            const yearLen = 364 + leapWeeks(r);
            days += yearLen;
          }
        }
        return {year:y, doy:days+1};
      },

      formatGPC(doy, year) {
        return `${year}.${String(doy).padStart(3,"0")}`;
      }
    };
    GPC.initHeptads();

    // ─── APP DATA ────────────────────────────────────────────────────────────
    let rules = JSON.parse(localStorage.getItem('simpleIfThen') || '[]');
    let timeline = JSON.parse(localStorage.getItem('simpleTimeline') || '[]');
    let sortDirection = localStorage.getItem('timelineSort') || 'desc';
    let gpcMode = localStorage.getItem('gpcMode') === 'true';

    if (!rules.length) {
      rules = [
        { id: 'r1', label: 'Job Monday', action: 'Buy EUC 🛴', date: '2025-06-17', on: true, stop: true },
        { id: 'r2', label: 'No job for a week', action: 'Move to Dubai ✈️', date: '2025-06-20', on: false, stop: false },
        { id: 'r3', label: 'Serbia offer', action: 'Move to Serbia 🇷🇸', date: '2025-07-01', on: false, stop: false },
        { id: 'r4', label: 'Today is Monday', action: 'Plan the week 📋', date: '', on: false, stop: false }
      ];
      save();
    }

    function save() {
      localStorage.setItem('simpleIfThen', JSON.stringify(rules));
      localStorage.setItem('simpleTimeline', JSON.stringify(timeline));
      localStorage.setItem('timelineSort', sortDirection);
      localStorage.setItem('gpcMode', gpcMode);
    }

    // ─── RENDER RULES ────────────────────────────────────────────────────────
    function renderRules() {
      const container = document.getElementById('rulesContainer');
      container.innerHTML = '';
      rules.forEach((r, idx) => {
        const div = document.createElement('div');
        div.className = 'rule-row';
        const dateDisplay = r.date ? `📅 ${r.date}` : '📅 auto today';
        const stopBadge = r.stop ? '<span class="stop-badge">⛔ stop</span>' : '';
        div.innerHTML = `
          <div class="toggle ${r.on ? 'on' : ''}" data-idx="${idx}">
            <div class="knob"></div>
          </div>
          <div class="rule-main">
            <div class="rule-label">${r.label} ${stopBadge}</div>
            <div class="rule-action">→ ${r.action}</div>
            <div class="rule-meta"><span>${dateDisplay}</span></div>
          </div>
          <div class="rule-actions">
            <button class="move-btn" data-idx="${idx}" data-dir="-1" ${idx === 0 ? 'disabled' : ''}>▲</button>
            <button class="move-btn" data-idx="${idx}" data-dir="1" ${idx === rules.length-1 ? 'disabled' : ''}>▼</button>
            <button class="edit-btn" data-idx="${idx}">✎</button>
            <button class="delete-btn" data-idx="${idx}">✕</button>
          </div>
        `;
        container.appendChild(div);

        div.querySelector('.toggle').addEventListener('click', () => {
          rules[idx].on = !rules[idx].on;
          save();
          renderRules();
        });
        div.querySelector('.delete-btn').addEventListener('click', () => {
          rules.splice(idx, 1);
          save();
          renderRules();
        });
        div.querySelector('.edit-btn').addEventListener('click', () => openEdit(idx));
        div.querySelectorAll('.move-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            const dir = parseInt(btn.dataset.dir);
            const newIdx = idx + dir;
            if (newIdx < 0 || newIdx >= rules.length) return;
            [rules[idx], rules[newIdx]] = [rules[newIdx], rules[idx]];
            save();
            renderRules();
          });
        });
      });
    }

    let editingIdx = null;
    function openEdit(idx) {
      editingIdx = idx;
      const r = rules[idx];
      document.getElementById('editLabel').value = r.label;
      document.getElementById('editAction').value = r.action;
      document.getElementById('editDate').value = r.date || '';
      document.getElementById('editStop').checked = r.stop || false;
      document.getElementById('editModal').classList.add('show');
    }
    document.getElementById('saveEditBtn').addEventListener('click', () => {
      if (editingIdx === null) return;
      const label = document.getElementById('editLabel').value.trim();
      const action = document.getElementById('editAction').value.trim();
      const date = document.getElementById('editDate').value;
      const stop = document.getElementById('editStop').checked;
      if (!label || !action) return;
      rules[editingIdx] = { ...rules[editingIdx], label, action, date: date || '', stop };
      save();
      renderRules();
      closeEdit();
    });
    document.getElementById('cancelEditBtn').addEventListener('click', closeEdit);
    function closeEdit() { document.getElementById('editModal').classList.remove('show'); editingIdx = null; }

    document.getElementById('addRuleBtn').addEventListener('click', () => {
      const label = prompt('IF condition:');
      if (!label) return;
      const action = prompt('THEN action:');
      if (!action) return;
      const date = prompt('Date (YYYY-MM-DD) or empty for today:', '');
      rules.push({ id: 'r' + Date.now(), label, action, date: date || '', on: false, stop: false });
      save();
      renderRules();
    });

    // ─── RUN ─────────────────────────────────────────────────────────────────
    function run() {
      timeline = [];
      const now = new Date();
      const todayStr = now.toISOString().slice(0, 10);
      const timeStr = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

      let stopped = false;
      for (const r of rules) {
        if (!r.on) continue;
        if (stopped) break;
        const displayDate = r.date || todayStr;
        timeline.push({ time: timeStr, action: r.action, date: displayDate });
        if (r.stop) { stopped = true; }
      }
      if (!timeline.length) {
        timeline.push({ time: timeStr, action: 'No rules triggered (toggle some ON)', date: todayStr });
      }
      save();
      renderTimeline();
    }

    // ─── RENDER TIMELINE ─────────────────────────────────────────────────────
    function renderTimeline() {
      const container = document.getElementById('timelineContainer');
      if (!timeline.length) {
        container.innerHTML = '<div style="color:#7a8499;text-align:center;padding:20px 0;">No events yet</div>';
        return;
      }

      const sorted = [...timeline].sort((a, b) => {
        const cmp = a.date.localeCompare(b.date);
        return sortDirection === 'asc' ? cmp : -cmp;
      });

      container.innerHTML = '';
      sorted.forEach(e => {
        const item = document.createElement('div');
        item.className = 'timeline-item';
        let dotEmoji, dateLabel;

        if (gpcMode) {
          const dt = new Date(e.date + 'T00:00:00Z');
          if (!isNaN(dt)) {
            const days = GPC.daysFromGregorian(dt);
            const gpc = GPC.gpcFromDays(days);
            dotEmoji = GPC.weekEmojis[(gpc.doy - 1) % 7];
            dateLabel = GPC.formatGPC(gpc.doy, gpc.year);
          } else {
            dotEmoji = '❓';
            dateLabel = 'invalid date';
          }
        } else {
          dotEmoji = '';   // use CSS dot
          dateLabel = ` ${e.date}`;
        }

        if (gpcMode) {
          item.innerHTML = `
            <span class="dot">${dotEmoji}</span>
            <span class="msg">${e.action}</span>
            <span class="date">${dateLabel}</span>
          `;
        } else {
          // Gregorian: use the original green dot with calendar emoji
          item.innerHTML = `
            <span class="dot" style="background:#4ade80; width:8px; height:8px; border-radius:50%; flex-shrink:0; margin-top:5px;"></span>
            <span class="msg">${e.action}</span>
            <span class="date">${dateLabel}</span>
          `;
        }
        container.appendChild(item);
      });

      document.querySelectorAll('.sort-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.dir === sortDirection);
      });
      document.getElementById('gpcBtn').classList.toggle('active', gpcMode);
    }

    // ─── EVENT LISTENERS ─────────────────────────────────────────────────────
    document.getElementById('sortAscBtn').addEventListener('click', () => {
      sortDirection = 'asc';
      save();
      renderTimeline();
    });
    document.getElementById('sortDescBtn').addEventListener('click', () => {
      sortDirection = 'desc';
      save();
      renderTimeline();
    });
    document.getElementById('gpcBtn').addEventListener('click', () => {
      gpcMode = !gpcMode;
      save();
      renderTimeline();
    });
    document.getElementById('clearBtn').addEventListener('click', () => {
      timeline = [];
      save();
      renderTimeline();
    });
    document.getElementById('runBtn').addEventListener('click', run);

    // ─── INIT ────────────────────────────────────────────────────────────────
    renderRules();
    renderTimeline();

    if (!timeline.length) {
      const now = new Date();
      const timeStr = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      timeline.push({ time: timeStr, action: '🚀 Ready – toggle rules ON and press Run', date: now.toISOString().slice(0, 10) });
      save();
      renderTimeline();
    }
  </script>
</body>
</html>
