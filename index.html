<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IF-THEN – Gregorian / GPC Timeline</title>
  <!-- JSZip for zip export/import -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0c0e14;
      color: #eaeef2;
      padding: 20px;
      max-width: 500px;
      margin: 0 auto;
      position: relative;
      min-height: 100vh;
    }
    h1 { font-size: 1.5rem; margin-bottom: 4px; }
    .sub { color: #7a8499; font-size: .85rem; margin-bottom: 20px; }
    .card {
      background: #161a22;
      border: 1px solid #2c3548;
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 12px;
    }
    .rule-row {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 8px 0;
      border-bottom: 1px solid #1e2532;
    }
    .rule-row:last-child { border-bottom: none; }
    .rule-main { flex: 1; min-width: 0; }
    .rule-label { font-size: .9rem; }
    .rule-action { font-size: .8rem; color: #a78bfa; }
    .rule-meta { display: flex; gap: 6px; align-items: center; margin-top: 2px; }
    .rule-meta span { font-size: .7rem; color: #7a8499; }
    .stop-badge {
      display: inline-block;
      font-size: .65rem;
      background: rgba(248,113,113,.15);
      color: #f87171;
      padding: 1px 6px;
      border-radius: 8px;
    }
    .rule-actions {
      display: flex;
      gap: 4px;
      flex-shrink: 0;
      align-items: flex-start;
    }
    .rule-actions button {
      background: #1e2532;
      border: 1px solid #2c3548;
      color: #eaeef2;
      padding: 4px 8px;
      border-radius: 6px;
      cursor: pointer;
      font-size: .7rem;
      line-height: 1;
    }
    .rule-actions .delete-btn { color: #f87171; }
    .rule-actions .move-btn { color: #7a8499; }
    .rule-actions .move-btn:disabled { opacity: .3; cursor: default; }
    .toggle {
      width: 36px; height: 20px;
      background: #283040;
      border-radius: 10px;
      position: relative;
      cursor: pointer;
      flex-shrink: 0;
      border: 1px solid #2c3548;
      transition: background .2s;
    }
    .toggle.on { background: #4ade80; border-color: #4ade80; }
    .toggle .knob {
      width: 14px; height: 14px;
      background: white;
      border-radius: 50%;
      position: absolute;
      top: 2px; left: 2px;
      transition: transform .2s;
    }
    .toggle.on .knob { transform: translateX(16px); }
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,.6);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 100;
    }
    .modal-overlay.show { display: flex; }
    .modal {
      background: #161a22;
      border: 1px solid #2c3548;
      border-radius: 14px;
      padding: 20px;
      width: 90%;
      max-width: 420px;
    }
    .modal h3 { margin-bottom: 12px; }
    .modal input {
      width: 100%;
      padding: 10px 12px;
      background: #1e2532;
      border: 1px solid #2c3548;
      border-radius: 8px;
      color: #eaeef2;
      font-size: .9rem;
      margin-bottom: 8px;
      outline: none;
    }
    .modal input:focus { border-color: #6c8cff; }
    .modal .row {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 8px;
    }
    .modal .row label { font-size: .85rem; white-space: nowrap; }
    .modal .row input[type="text"] { flex: 1; margin-bottom: 0; }
    .modal .row input[type="checkbox"] { width: auto; margin-bottom: 0; }
    .modal textarea {
      width: 100%;
      padding: 10px 12px;
      background: #1e2532;
      border: 1px solid #2c3548;
      border-radius: 8px;
      color: #eaeef2;
      font-size: .9rem;
      margin-bottom: 8px;
      outline: none;
      resize: vertical;
      min-height: 60px;
      font-family: inherit;
    }
    .modal textarea:focus { border-color: #6c8cff; }
    .modal .btn-row {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }
    .modal .btn-row button {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      font-size: .9rem;
      border: none;
      cursor: pointer;
    }
    .modal .btn-save { background: #6c8cff; color: white; }
    .modal .btn-cancel { background: #1e2532; color: #eaeef2; border: 1px solid #2c3548; }
    .btn-run {
      background: #6c8cff;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      flex: 1;
    }
    .btn-run:hover { background: #4f6fdb; }
    .btn-clear {
      background: #1e2532;
      color: #eaeef2;
      border: 1px solid #2c3548;
      padding: 12px 16px;
      border-radius: 10px;
      cursor: pointer;
      font-size: .9rem;
      flex: 0 0 auto;
    }
    .fab-bar { display: flex; gap: 8px; margin-top: 12px; }
    .timeline-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      gap: 4px;
      flex-wrap: wrap;
    }
    .timeline-header .sort-btn,
    .timeline-header .gpc-btn {
      background: #1e2532;
      border: 1px solid #2c3548;
      color: #7a8499;
      padding: 4px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: .75rem;
    }
    .timeline-header .sort-btn.active,
    .timeline-header .gpc-btn.active { color: #6c8cff; border-color: #6c8cff; }
    .timeline { max-height: 240px; overflow-y: auto; }
    .timeline-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 6px 0;
      border-bottom: 1px solid #1e2532;
      font-size: .85rem;
    }
    .timeline-item .dot {
      font-size: 1rem;
      flex-shrink: 0;
      margin-top: 2px;
      line-height: 1;
    }
    .timeline-item .msg { flex: 1; }
    .timeline-item .msg a { color: #6c8cff; text-decoration: underline; }
    .timeline-item .msg a:hover { color: #a78bfa; }
    .timeline-item .date { color: #a78bfa; font-size: .75rem; }
    .add-btn {
      background: #1e2532;
      border: 1px solid #2c3548;
      color: #6c8cff;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: .85rem;
      margin-bottom: 8px;
    }
    .header-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .hamburger {
      position: fixed;
      top: 16px;
      left: 16px;
      background: #1e2532;
      border: 1px solid #2c3548;
      border-radius: 8px;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 200;
      transition: left .3s;
    }
    .hamburger span {
      display: block;
      width: 20px;
      height: 2px;
      background: #eaeef2;
      border-radius: 2px;
      position: relative;
      transition: .3s;
    }
    .hamburger span::before,
    .hamburger span::after {
      content: '';
      position: absolute;
      left: 0;
      width: 100%;
      height: 2px;
      background: #eaeef2;
      border-radius: 2px;
      transition: .3s;
    }
    .hamburger span::before { top: -6px; }
    .hamburger span::after { top: 6px; }
    .menu-open .hamburger { left: 280px; }
    .menu-open .hamburger span { background: transparent; }
    .menu-open .hamburger span::before { transform: rotate(45deg); top: 0; }
    .menu-open .hamburger span::after { transform: rotate(-45deg); top: 0; }
    .side-menu {
      position: fixed;
      top: 0;
      left: -260px;
      width: 260px;
      height: 100vh;
      background: #161a22;
      border-right: 1px solid #2c3548;
      padding: 80px 20px 20px;
      transition: left .3s;
      z-index: 150;
    }
    .menu-open .side-menu { left: 0; }
    .side-menu button {
      display: block;
      width: 100%;
      background: #1e2532;
      border: 1px solid #2c3548;
      color: #eaeef2;
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 8px;
      cursor: pointer;
      font-size: .9rem;
      text-align: left;
    }
    .side-menu button:hover { background: #283040; }
    .menu-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,.5);
      display: none;
      z-index: 140;
    }
    .menu-open .menu-overlay { display: block; }
    /* Copied toast */
    .toast-copied {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: #4ade80;
      color: #0c0e14;
      padding: 8px 18px;
      border-radius: 20px;
      font-size: .85rem;
      font-weight: 600;
      z-index: 300;
      opacity: 0;
      transition: opacity .3s;
      pointer-events: none;
    }
    .toast-copied.show { opacity: 1; }
  </style>
</head>
<body>

  <!-- Hamburger + Side Menu -->
  <div class="hamburger" id="hamburger"><span></span></div>
  <div class="menu-overlay" id="menuOverlay"></div>
  <div class="side-menu" id="sideMenu">
    <button id="exportBtn">📤 Export .zip</button>
    <button id="importBtn">📥 Import .zip</button>
    <button id="clearDataBtn">🗑 Clear all data</button>
    <button id="helpBtn">❓ Help</button>
  </div>

  <div style="padding-left: 50px;">
    <h1>⚡ IF → THEN</h1>
    <div class="sub">Toggle ON. Stop works by list order. Now with notes.</div>
  </div>

  <div class="card">
    <div class="header-bar">
      <span style="font-weight: 600; font-size: .9rem;">Rules</span>
      <button class="add-btn" id="addRuleBtn">+ Add rule</button>
    </div>
    <div id="rulesContainer"></div>
  </div>

  <div class="card">
    <div class="timeline-header">
      <span style="font-weight: 600; font-size: .9rem;">📜 Timeline</span>
      <div style="display:flex; gap:4px;">
        <button class="sort-btn" id="sortAscBtn" data-dir="asc">Oldest</button>
        <button class="sort-btn" id="sortDescBtn" data-dir="desc">Newest</button>
        <button class="gpc-btn" id="gpcBtn">GPC</button>
      </div>
    </div>
    <div id="timelineContainer" class="timeline">
      <div style="color: #7a8499; text-align: center; padding: 20px 0;">No events yet</div>
    </div>
  </div>

  <div class="fab-bar">
    <button class="btn-run" id="runBtn">▶ Run</button>
    <button class="btn-clear" id="clearBtn">Clear</button>
  </div>

  <!-- Edit Modal -->
  <div class="modal-overlay" id="editModal">
    <div class="modal">
      <h3>Edit Rule</h3>
      <input id="editLabel" placeholder="IF condition" />
      <input id="editAction" placeholder="THEN action" />
      <div class="row">
        <label for="editDate" style="white-space:nowrap;">Date</label>
        <input type="text" id="editDate" placeholder="YYYY-MM-DD"
               pattern="\d{4}-\d{2}-\d{2}" title="Use YYYY-MM-DD format" />
        <button id="editDatePickerBtn" type="button" style="
          background: #1e2532;
          border: 1px solid #2c3548;
          border-radius: 8px;
          padding: 10px;
          cursor: pointer;
          line-height: 1;
          font-size: 1rem;
        ">📅</button>
      </div>
      <input type="date" id="editDatePickerHidden" style="display:none;" />
      <div class="row">
        <label for="editUrl" style="flex-shrink:0;">Link (optional)</label>
        <input type="text" id="editUrl" placeholder="google.com" />
      </div>
      <div class="row">
        <input type="checkbox" id="editStop" style="width:auto;" />
        <label for="editStop">Stop further rules if this fires</label>
      </div>
      <div style="display:flex; align-items:center; gap:6px; margin-bottom:4px;">
  <label for="editNotes" style="font-size:.85rem;">Notes</label>
  <button id="copyNotesBtn" type="button" style="
    margin-left: auto;   /* pushes button to the right */
    background: #1e2532;
    border: 1px solid #2c3548;
    border-radius: 6px;
    padding: 4px 8px;
    cursor: pointer;
    font-size: .8rem;
    line-height: 1;
  ">📋</button>
</div>
      <textarea id="editNotes" placeholder="Any notes or reminders..." rows="3"></textarea>
      <div class="btn-row">
        <button class="btn-save" id="saveEditBtn">Save</button>
        <button class="btn-cancel" id="cancelEditBtn">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Copied toast -->
  <div class="toast-copied" id="copiedToast">Copied!</div>

  <script>
    // ─── DATE PICKER HELPER ──────────────────────────────────────────────────
    const editDateInput = document.getElementById('editDate');
    const editDatePickerHidden = document.getElementById('editDatePickerHidden');
    const editDatePickerBtn = document.getElementById('editDatePickerBtn');

    editDatePickerBtn.addEventListener('click', () => {
      const current = editDateInput.value.trim();
      editDatePickerHidden.value = /^\d{4}-\d{2}-\d{2}$/.test(current) ? current : '';
      editDatePickerHidden.showPicker();
    });

    editDatePickerHidden.addEventListener('change', () => {
      editDateInput.value = editDatePickerHidden.value || '';
    });

    editDatePickerHidden.addEventListener('input', () => {
      editDateInput.value = editDatePickerHidden.value || '';
    });

    // ─── URL NORMALISATION ───────────────────────────────────────────────────
    function ensureAbsoluteUrl(url) {
      if (!url) return '';
      let normalized = url.trim();
      if (!/^https?:\/\//i.test(normalized)) normalized = 'https://' + normalized;
      try {
        const parsed = new URL(normalized);
        const hostParts = parsed.hostname.split('.');
        if (hostParts.length === 2 && hostParts[0] !== 'www') {
          parsed.hostname = 'www.' + parsed.hostname;
          normalized = parsed.toString();
        }
      } catch (e) {}
      return normalized;
    }

    // ─── GPC CALENDAR ────────────────────────────────────────────────────────
    const GPC = {
      epochUTC: Date.UTC(1982,2,24),
      epochYear: 5979,
      weekEmojis: ['🟠','🟤','🌺','🌏','🟢','🔵','🟣'],
      suitCodes: [0x2663, 0x2666, 0x2665, 0x2660],
      heptads: Object.create(null),
      initHeptads() {
        const starts = [1,8,15,22,31,38,45,52,61,68,75,82,89,
          92,99,106,113,122,129,136,143,152,159,166,173,180,
          183,190,197,204,213,220,227,234,243,250,257,264,271,
          274,281,288,295,304,311,318,325,334,341,348,355,362];
        let i = 0;
        for (let s=0; s<4; s++) {
          for (let w=1; w<=13; w++) {
            const long = (w<=4 || w===8 || w===12);
            const len = long ? 9 : 7;
            for (let d=0; d<len; d++) {
              const doy = starts[i] + d;
              if (doy<=364) this.heptads[doy] = { suit: this.suitCodes[s], week: w };
            }
            i++;
          }
        }
      },
      daysFromGregorian(d) { return Math.floor((d.getTime() - this.epochUTC)/86400000); },
      gregorianFromDays(days) { return new Date(this.epochUTC + days*86400000); },
      gpcFromDays(days) {
        const mod = (a,b)=>((a%b)+b)%b;
        const leapWeeks = (r)=>{
          let l=0;
          if(mod(r,7)>=6) l+=7;
          if(mod(r,49)>=48) l+=7;
          if(mod(r+29,70)===0) l+=7;
          return l;
        };
        const cycleYears = 490, cycleDays = 178969;
        let y = this.epochYear;
        if(days >= cycleDays || days <= -cycleDays){
          const cycles = Math.trunc(days / cycleDays);
          y += cycles * cycleYears;
          days -= cycles * cycleDays;
        }
        if(days >= 0){
          while(true){
            const r = y - this.epochYear;
            const yearLen = 364 + leapWeeks(r);
            if(days < yearLen) break;
            days -= yearLen;
            y++;
          }
        } else {
          while(days < 0){
            y--;
            const r = y - this.epochYear;
            const yearLen = 364 + leapWeeks(r);
            days += yearLen;
          }
        }
        return {year:y, doy:days+1};
      },
      formatGPC(doy, year) { return `${year}.${String(doy).padStart(3,"0")}`; }
    };
    GPC.initHeptads();

    // ─── APP DATA ────────────────────────────────────────────────────────────
    let rules = JSON.parse(localStorage.getItem('simpleIfThen') || '[]');
    let timeline = JSON.parse(localStorage.getItem('simpleTimeline') || '[]');
    let sortDirection = localStorage.getItem('timelineSort') || 'desc';
    let gpcMode = localStorage.getItem('gpcMode') === 'true';

    if (!rules.length) {
      rules = [
        { id: 'r1', label: 'Today is Monday', action: 'Plan the week 📅', date: '', on: false, stop: false, url: '', notes: '' },
        { id: 'r2', label: 'Retirement age', action: 'Collect pension & relax 🏖️', date: '2025-08-01', on: false, stop: true, url: '', notes: '' },
        { id: 'r3', label: 'Job offer from FAANG', action: 'Negotiate & accept 💼', date: '2025-07-15', on: false, stop: false, url: '', notes: '' },
        { id: 'r4', label: 'Divorce final', action: 'Close that chapter 📄', date: '2025-09-10', on: false, stop: false, url: '', notes: '' }
      ];
      save();
    }

    function save() {
      localStorage.setItem('simpleIfThen', JSON.stringify(rules));
      localStorage.setItem('simpleTimeline', JSON.stringify(timeline));
      localStorage.setItem('timelineSort', sortDirection);
      localStorage.setItem('gpcMode', gpcMode);
    }

    // ─── HAMBURGER MENU ─────────────────────────────────────────────────────
    const hamburger = document.getElementById('hamburger');
    const menuOverlay = document.getElementById('menuOverlay');
    const body = document.body;
    function toggleMenu(open) {
      if (open === undefined) open = !body.classList.contains('menu-open');
      body.classList.toggle('menu-open', open);
    }
    hamburger.addEventListener('click', () => toggleMenu());
    menuOverlay.addEventListener('click', () => toggleMenu(false));

    // ─── EXPORT / IMPORT / CLEAR / HELP ─────────────────────────────────────
    document.getElementById('exportBtn').addEventListener('click', async () => {
      const zip = new JSZip();
      const data = { rules, timeline, sortDirection, gpcMode };
      zip.file('rules.json', JSON.stringify(data, null, 2));
      const blob = await zip.generateAsync({ type: 'blob' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `LogicBoard-${new Date().toISOString().slice(0,10)}.zip`;
      a.click();
      URL.revokeObjectURL(url);
      toggleMenu(false);
    });

    document.getElementById('importBtn').addEventListener('click', () => {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = '.zip';
      input.onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        try {
          const zip = await JSZip.loadAsync(file);
          const content = await zip.file('rules.json').async('string');
          const data = JSON.parse(content);
          if (data.rules) rules = data.rules;
          if (data.timeline) timeline = data.timeline;
          if (data.sortDirection) sortDirection = data.sortDirection;
          if (data.gpcMode !== undefined) gpcMode = data.gpcMode;
          save();
          renderRules();
          renderTimeline();
          toggleMenu(false);
          alert('Import successful!');
        } catch { alert('Invalid .zip file (must contain rules.json).'); }
      };
      input.click();
    });

    document.getElementById('clearDataBtn').addEventListener('click', () => {
      if (confirm('Delete all rules, timeline, and reset to defaults?')) {
        localStorage.removeItem('simpleIfThen');
        localStorage.removeItem('simpleTimeline');
        localStorage.removeItem('timelineSort');
        localStorage.removeItem('gpcMode');
        location.reload();
      }
    });

    document.getElementById('helpBtn').addEventListener('click', () => {
      alert(
`⚡ IF → THEN

• Toggle a rule ON to make it active.
• Run checks all ON rules in order.
• Stop stops further rules from firing.
• Use arrows to reorder rules (order matters for Stop).
• GPC mode shows dates in the Gregorian‑Pataphysical Calendar.
• URL is optional – if you enter something, it's auto‑fixed (https & www added as needed).
• Date must be in YYYY-MM-DD format. Use 📅 to pick from calendar. Native picker's clear button works.
• Notes are visible when editing a rule — use 📋 to copy them.
• Export saves your data as a .zip file. Import restores it.`
      );
      toggleMenu(false);
    });

    // ─── NOTES COPY ─────────────────────────────────────────────────────────
    const copiedToast = document.getElementById('copiedToast');
    let toastTimer = null;
    function showCopiedToast() {
      copiedToast.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => copiedToast.classList.remove('show'), 1500);
    }

    document.getElementById('copyNotesBtn').addEventListener('click', () => {
      const text = document.getElementById('editNotes').value;
      if (!text) return;
      navigator.clipboard.writeText(text).then(showCopiedToast).catch(() => {
        // fallback
        const ta = document.getElementById('editNotes');
        ta.select();
        document.execCommand('copy');
        showCopiedToast();
      });
    });

    // ─── RENDER RULES ────────────────────────────────────────────────────────
    function renderRules() {
      const container = document.getElementById('rulesContainer');
      container.innerHTML = '';
      rules.forEach((r, idx) => {
        const div = document.createElement('div');
        div.className = 'rule-row';
        const dateDisplay = r.date ? `📅 ${r.date}` : '📅 auto today';
        const stopBadge = r.stop ? '<span class="stop-badge">⛔ stop</span>' : '';
        const linkIndicator = r.url ? '🔗' : '';
        const notesIndicator = r.notes ? '📝' : '';
        div.innerHTML = `
          <div class="toggle ${r.on ? 'on' : ''}" data-idx="${idx}">
            <div class="knob"></div>
          </div>
          <div class="rule-main">
            <div class="rule-label">${r.label} ${stopBadge} ${linkIndicator} ${notesIndicator}</div>
            <div class="rule-action">→ ${r.action}</div>
            <div class="rule-meta"><span>${dateDisplay}</span></div>
          </div>
          <div class="rule-actions">
            <button class="move-btn" data-idx="${idx}" data-dir="-1" ${idx === 0 ? 'disabled' : ''}>▲</button>
            <button class="move-btn" data-idx="${idx}" data-dir="1" ${idx === rules.length-1 ? 'disabled' : ''}>▼</button>
            <button class="edit-btn" data-idx="${idx}">✎</button>
            <button class="delete-btn" data-idx="${idx}">✕</button>
          </div>
        `;
        container.appendChild(div);
        div.querySelector('.toggle').addEventListener('click', () => {
          rules[idx].on = !rules[idx].on;
          save();
          renderRules();
        });
        div.querySelector('.delete-btn').addEventListener('click', () => {
          rules.splice(idx, 1);
          save();
          renderRules();
        });
        div.querySelector('.edit-btn').addEventListener('click', () => openEdit(idx));
        div.querySelectorAll('.move-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            const dir = parseInt(btn.dataset.dir);
            const newIdx = idx + dir;
            if (newIdx < 0 || newIdx >= rules.length) return;
            [rules[idx], rules[newIdx]] = [rules[newIdx], rules[idx]];
            save();
            renderRules();
          });
        });
      });
    }

    let editingIdx = null;
    function openEdit(idx) {
      editingIdx = idx;
      const r = rules[idx];
      document.getElementById('editLabel').value = r.label;
      document.getElementById('editAction').value = r.action;
      document.getElementById('editDate').value = r.date || '';
      document.getElementById('editUrl').value = r.url || '';
      document.getElementById('editStop').checked = r.stop || false;
      document.getElementById('editNotes').value = r.notes || '';
      document.getElementById('editModal').classList.add('show');
    }

    document.getElementById('saveEditBtn').addEventListener('click', () => {
      if (editingIdx === null) return;
      const label = document.getElementById('editLabel').value.trim();
      const action = document.getElementById('editAction').value.trim();
      const rawDate = document.getElementById('editDate').value.trim();
      const rawUrl = document.getElementById('editUrl').value.trim();
      if (rawDate !== '' && !/^\d{4}-\d{2}-\d{2}$/.test(rawDate)) {
        alert('Date must be in YYYY-MM-DD format (or leave empty).');
        return;
      }
      const stop = document.getElementById('editStop').checked;
      const notes = document.getElementById('editNotes').value.trim();
      if (!label || !action) return;
      const url = rawUrl ? ensureAbsoluteUrl(rawUrl) : '';
      rules[editingIdx] = { ...rules[editingIdx], label, action, date: rawDate, url, stop, notes };
      save();
      renderRules();
      closeEdit();
    });

    document.getElementById('cancelEditBtn').addEventListener('click', closeEdit);
    function closeEdit() { document.getElementById('editModal').classList.remove('show'); editingIdx = null; }

    document.getElementById('addRuleBtn').addEventListener('click', () => {
      const label = prompt('IF condition:');
      if (!label) return;
      const action = prompt('THEN action:');
      if (!action) return;
      rules.push({
        id: 'r' + Date.now(),
        label,
        action,
        date: '',
        url: '',
        on: false,
        stop: false,
        notes: ''
      });
      save();
      renderRules();
    });

    // ─── RUN ─────────────────────────────────────────────────────────────────
    function run() {
      timeline = [];
      const now = new Date();
      const todayStr = now.toISOString().slice(0, 10);
      const timeStr = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

      let stopped = false;
      for (const r of rules) {
        if (!r.on) continue;
        if (stopped) break;
        const displayDate = r.date || todayStr;
        timeline.push({ time: timeStr, action: r.action, date: displayDate, url: r.url || '' });
        if (r.stop) stopped = true;
      }
      if (!timeline.length) {
        timeline.push({ time: timeStr, action: 'No rules triggered (toggle some ON)', date: todayStr, url: '' });
      }
      save();
      renderTimeline();
    }

    // ─── RENDER TIMELINE ─────────────────────────────────────────────────────
    function renderTimeline() {
      const container = document.getElementById('timelineContainer');
      if (!timeline.length) {
        container.innerHTML = '<div style="color:#7a8499;text-align:center;padding:20px 0;">No events yet</div>';
        return;
      }
      const sorted = [...timeline].sort((a, b) => {
        const cmp = a.date.localeCompare(b.date);
        return sortDirection === 'asc' ? cmp : -cmp;
      });
      container.innerHTML = '';
      sorted.forEach(e => {
        const item = document.createElement('div');
        item.className = 'timeline-item';
        let dotEmoji, dateLabel;
        if (gpcMode) {
          const dt = new Date(e.date + 'T00:00:00Z');
          if (!isNaN(dt)) {
            const days = GPC.daysFromGregorian(dt);
            const gpc = GPC.gpcFromDays(days);
            dotEmoji = GPC.weekEmojis[(gpc.doy - 1) % 7];
            dateLabel = GPC.formatGPC(gpc.doy, gpc.year);
          } else {
            dotEmoji = '❓';
            dateLabel = 'invalid date';
          }
        } else {
          dotEmoji = '';
          dateLabel = ` ${e.date}`;
        }
        const actionHtml = e.url ? `<a href="${e.url}" target="_blank" rel="noopener noreferrer">${e.action}</a>` : e.action;
        item.innerHTML = gpcMode ? `
          <span class="dot">${dotEmoji}</span>
          <span class="msg">${actionHtml}</span>
          <span class="date">${dateLabel}</span>
        ` : `
          <span class="dot" style="background:#4ade80; width:8px; height:8px; border-radius:50%; flex-shrink:0; margin-top:5px;"></span>
          <span class="msg">${actionHtml}</span>
          <span class="date">${dateLabel}</span>
        `;
        container.appendChild(item);
      });
      document.querySelectorAll('.sort-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.dir === sortDirection));
      document.getElementById('gpcBtn').classList.toggle('active', gpcMode);
    }

    document.getElementById('sortAscBtn').addEventListener('click', () => { sortDirection = 'asc'; save(); renderTimeline(); });
    document.getElementById('sortDescBtn').addEventListener('click', () => { sortDirection = 'desc'; save(); renderTimeline(); });
    document.getElementById('gpcBtn').addEventListener('click', () => { gpcMode = !gpcMode; save(); renderTimeline(); });
    document.getElementById('clearBtn').addEventListener('click', () => { timeline = []; save(); renderTimeline(); });
    document.getElementById('runBtn').addEventListener('click', run);

    renderRules();
    renderTimeline();
    if (!timeline.length) {
      const now = new Date();
      const timeStr = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      timeline.push({ time: timeStr, action: '🚀 Ready – toggle rules ON and press Run', date: now.toISOString().slice(0, 10), url: '' });
      save();
      renderTimeline();
    }
  </script>
</body>
</html>
